<style>
        @keyframes fadeInOut {
            0%, 10% { opacity: 0; transform: translateY(10px); filter: blur(4px); }
            20%, 80% { opacity: 1; transform: translateY(0); filter: blur(0px); }
            90%, 100% { opacity: 0; transform: translateY(-10px); filter: blur(4px); }
        }

        @keyframes subtleScale {
            0% { transform: scale(0.98); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-status {
            animation: fadeInOut 4s infinite ease-in-out;
        }

        .animate-settle {
            animation: subtleScale 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .glass-panel {
            background: rgba(17, 20, 21, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .noise-to-calm {
            transition: filter 10s cubic-bezier(0.22, 1, 0.36, 1);
        }

<body class="bg-background text-on-surface selection:bg-secondary/30 selection:text-secondary overflow-hidden">
<!-- Cinematic Background Shader -->
<div class="fixed inset-0 z-0">
<!-- STITCH_SHADER_START:ANIMATION_2 class="w-full h-full noise-to-calm" -->
<div class="w-full h-full noise-to-calm" style="display:block;">
<canvas id="shader-canvas-ANIMATION_2" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_2');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
uniform float u_time;
uniform vec2 u_resolution;

varying vec2 v_texCoord;

void main() {
    vec2 uv = v_texCoord;
    
    // Create a series of flowing waves
    float noise = 0.0;
    for(float i = 1.0; i < 4.0; i++) {
        uv.y += sin(uv.x * 3.0 * i + u_time * 0.5) * 0.1 / i;
        uv.x += cos(uv.y * 2.0 * i + u_time * 0.3) * 0.05 / i;
    }
    
    // Define the colors from the Drift palette (Deep Indigo, Soft Teal, Lavender)
    vec3 baseColor = vec3(0.04, 0.05, 0.1); // Deep Indigo (#0A0E1A)
    vec3 teal = vec3(0.53, 0.85, 0.82);     // Soft Teal (#88D8D0)
    vec3 lavender = vec3(0.7, 0.65, 0.84);  // Lavender (#B4A7D6)
    
    // Mix based on UV and time
    float mixVal = smoothstep(0.3, 0.7, uv.y + sin(u_time * 0.2) * 0.1);
    vec3 color = mix(baseColor, mix(teal, lavender, sin(u_time * 0.5) * 0.5 + 0.5), mixVal);
    
    // Add a subtle "resolving" effect - as time goes on (conceptually), it gets smoother
    // Here we just keep it ambiently flowing
    
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<span class="material-symbols-outlined text-[20px]" id="audio-icon">volume_off</span>
</button>
</div>
<!-- Interaction & State Logic -->
<script>
        // Status Text Cycle
        const statuses = [
            "Reading your mood",
            "Matching your pace",
            "Filtering the noise",
            "Almost there"
        ];
        let statusIndex = 0;
        const statusEl = document.getElementById('status-text');

        setInterval(() => {
            statusIndex = (statusIndex + 1) % statuses.length;
            statusEl.innerText = statuses[statusIndex];
        }, 4000);

        // Tips Cycle
        const tips = [
            "Next tip: Decision fatigue is a real physical drain.",
            "Breath as a metric: Slow exhales signal safety to the brain.",
            "Digital minimalism isn't about absence, but presence.",
            "Your attention is the most valuable currency you own."
        ];
        let tipIndex = 0;
        const tipEl = document.getElementById('tip-text');

        setInterval(() => {
            tipEl.classList.add('opacity-0', 'translate-y-2');
            setTimeout(() => {
                tipIndex = (tipIndex + 1) % tips.length;
                tipEl.innerText = tips[tipIndex];
                tipEl.classList.remove('opacity-0', 'translate-y-2');
            }, 700);
        }, 4000);

        // Shader Evolution Logic
        // We simulate the visual 'calming' by applying a filter transition over 10s
        window.addEventListener('load', () => {
            const shader = document.getElementById('mainShader');
            // Starting state: high noise (simulated via contrast/blur if shader doesn't support internal param mapping)
            shader.style.filter = "contrast(1.5) brightness(1.2) saturate(1.5)";
            
            setTimeout(() => {
                shader.style.filter = "contrast(1) brightness(0.8) saturate(0.6)";
            }, 100);
        });

        // Audio Toggle Interaction
        let isMuted = true;
        const audioBtn = document.getElementById('audio-toggle');
        const audioIcon = document.getElementById('audio-icon');

        audioBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            audioIcon.innerText = isMuted ? 'volume_off' : 'volume_up';
            audioBtn.classList.toggle('text-secondary', !isMuted);
            
            // Add a subtle click feedback
            audioBtn.style.transform = 'scale(0.9)';
            setTimeout(() => audioBtn.style.transform = 'scale(1.05)', 100);
        });

        // Micro-interaction for mouse movement
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            document.querySelector('h1').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
