<style>

            overflow-x: hidden;
        }
        .glass-card {

        .tile-selected {

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            box-shadow: 0 0 8px rgba(133, 213, 205, 0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #cdbff0; /* Lavender/Tertiary */
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -8px;
            box-shadow: 0 0 15px rgba(205, 191, 240, 0.6);

        .weighted-transition {
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);

<script>
        // Soundscape Tile Selection Logic
        const tiles = document.querySelectorAll('.sound-tile');
        tiles.forEach(tile => {
            tile.addEventListener('click', () => {
                tiles.forEach(t => {
                    t.classList.remove('selected', 'tile-selected');
                    t.querySelector('.absolute').style.opacity = '0';
                });
                tile.classList.add('selected', 'tile-selected');
                tile.querySelector('.absolute').style.opacity = '1';
                
                // Add micro-interaction click effect
                tile.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    tile.style.transform = 'scale(1.02)';
                }, 100);
            });
        });

        // Duration Slider Update
        const slider = document.getElementById('duration-slider');
        const display = document.getElementById('duration-display');
        slider.addEventListener('input', (e) => {
            display.textContent = `${e.target.value} minutes`;
        });
    </script>
